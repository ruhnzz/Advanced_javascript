<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Email Password Validator</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f9f9fa,#7f08f5);
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:20px;
color:#333;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:5px;
font-weight:bold;
color:#444;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

input:focus{
outline:none;
border-color:#667eea;
}

button{
width:100%;
padding:10px;
border:none;
background:#667eea;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#5563d1;
}

.error{
color:red;
font-size:13px;
margin-top:3px;
display: none;
}

.success{
color:green;
font-size:14px;
text-align:center;
margin-top:10px;
display: none;
}
</style>
</head>

<body>

<div class="container">
<h2>Login Form</h2>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input type="text" id="email" placeholder="Enter email">
<p id="emailError" class="error">error</p>
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="password" placeholder="Enter password">
<p id="passwordError" class="error">error</p>
</div>

<button type="submit">Login</button>

<p id="successMessage" class="success">Successful Login</p>

</form>
</div>

<script>
    let form = document.querySelector("form");
    let email = document.querySelector("#email");
    let password = document.querySelector("#password");

    form.addEventListener("submit",(e)=>{
        e.preventDefault();
        
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;
    //   console.log(email.value)
    let emailValid = emailRegex.test(email.value)
    let passwordValid = passwordRegex.test(password.value)
    // console.log(emailValid,passwordValid)
    let isValid = true;
    if(!emailValid){
        document.querySelector("#emailError").style.display="initial"
        document.querySelector("#emailError").textContent="please enter valid email" 
        isValid=false;       
    }
        if(!passwordValid){
        document.querySelector("#passwordError").style.display="initial"
        document.querySelector("#passwordError").textContent="please enter valid password" 
        isValid=false;       
    }
    if(isValid){
        document.querySelector("#successMessage").style.display="initial"
    }

       email.value="";
        password.value="";
    })

    form.addEventListener('input',()=>{
                document.querySelector("#emailError").style.display="none"
                document.querySelector("#passwordError").style.display="none"
        document.querySelector("#successMessage").style.display="none"

    })
</script>

</body>
</html>
